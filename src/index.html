<!doctype html>
<html lang="ja" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Home Stock</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container py-4">
      <h2 class="text-center mb-4">📦 Home Stock</h2>

      <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
          <button class="nav-link active" id="inventoryTab">在庫</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="shoppingTab">買い物</button>
        </li>
      </ul>

      <div id="inventoryView">
        <div class="card p-3 mb-3 shadow-sm">
          <input id="itemName" class="form-control mb-2" placeholder="商品名" autocomplete="false" />
          <input id="group" class="form-control mb-2" placeholder="グループ" autocomplete="false" />
          <input id="expiry" type="date" class="form-control mb-2" />
          <button id="addBtn" class="btn btn-primary w-100">追加</button>
        </div>
        <ul id="inventoryList" class="list-group"></ul>
      </div>

      <div id="shoppingView" class="d-none">
        <div class="card p-3 mb-3 shadow-sm">
          <input id="shoppingName" class="form-control mb-2" placeholder="商品名" />
          <button id="addShoppingBtn" class="btn btn-primary w-100">追加</button>
        </div>
        <ul id="shoppingList" class="list-group"></ul>
      </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
            <button class="btn btn-primary" id="modalSave">保存</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/ts/main.ts"></script>
  </body>
</html>
